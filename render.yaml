services:
  - type: web
    name: edupath-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node --experimental-sqlite dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://edupath-frontend-mykl.onrender.com

  - type: web
    name: edupath-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_API_URL
        value: https://edupath-backend-irch.onrender.com
